spring.application.name=employee_tracker

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/employee_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate

# Disable open-session-in-view: entities are now mapped to DTOs inside
# transactional service methods, so we don't need (or want) the session held
# open during view rendering. OSIV is a well-known anti-pattern in production.
spring.jpa.open-in-view=false

# Convenient while developing; turn off in production (log noise + overhead).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true